server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip for common static asset types.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # Long-lived caching for fingerprinted assets.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Prevent caching of HTML so new deployments are picked up quickly.
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # SPA fallback support.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
